<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: arial, sans-serif;
    }

    body {
        background: #fff;
        color: #202124;
    }

   .header {
        display: flex;
        justify-content: flex-end;
        padding: 15px 20px;
        font-size: 13px;
        gap: 15px;
        align-items: center;
    }

   .header span {
        color: #202124;
        cursor: pointer;
    }

   .header span:hover {
        text-decoration: underline;
    }

   .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 100px;
        min-height: 60vh;
    }

   .logo {
        font-size: 90px;
        font-weight: 400;
        letter-spacing: -5px;
        margin-bottom: 30px;
    }

   .logo span:nth-child(1) { color: #4285f4; }
   .logo span:nth-child(2) { color: #ea4335; }
   .logo span:nth-child(3) { color: #fbbc05; }
   .logo span:nth-child(4) { color: #4285f4; }
   .logo span:nth-child(5) { color: #34a853; }
   .logo span:nth-child(6) { color: #ea4335; }

   .search-box {
        width: 90%;
        max-width: 580px;
        position: relative;
    }

   .search-input {
        width: 100%;
        padding: 14px 20px;
        font-size: 16px;
        border: 1px solid #dfe1e5;
        border-radius: 24px;
        outline: none;
    }

   .search-input:hover {
        box-shadow: 0 1px 6px rgba(32,33,36,0.28);
    }

   .search-input:focus {
        box-shadow: 0 1px 6px rgba(32,33,36,0.28);
    }

   .buttons {
        margin-top: 30px;
        display: flex;
        gap: 12px;
        justify-content: center;
    }

   .btn {
        background: #f8f9fa;
        border: 1px solid #f8f9fa;
        border-radius: 4px;
        color: #3c4043;
        font-size: 14px;
        padding: 10px 20px;
        cursor: pointer;
    }

   .btn:hover {
        border: 1px solid #dadce0;
        box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }

   .results {
        display: none;
        max-width: 650px;
        margin: 30px auto;
        padding: 0 20px;
    }

   .results.show {
        display: block;
    }

   .result-item {
        margin-bottom: 30px;
    }

   .result-url {
        font-size: 14px;
        color: #202124;
        margin-bottom: 4px;
    }

   .result-title {
        font-size: 20px;
        color: #1a0dab;
        display: block;
        margin-bottom: 4px;
        cursor: pointer;
    }

   .result-title:hover {
        text-decoration: underline;
    }

   .result-desc {
        font-size: 14px;
        color: #4d5156;
        line-height: 1.5;
    }

   .back {
        margin: 20px;
        color: #1a0dab;
        cursor: pointer;
        display: none;
    }

   .back.show {
        display: inline-block;
    }

   .back:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>
    <div class="header">
        <span>Gmail</span>
        <span>Bilder</span>
    </div>

    <div class="main" id="mainPage">
        <div class="logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" autocomplete="off">
        </div>
        <div class="buttons">
            <button class="btn" onclick="search()">Google Suche</button>
            <button class="btn" onclick="search()">Auf gut Glück!</button>
        </div>
    </div>

    <div class="back" id="backBtn" onclick="goBack()">← Zurück zu Google</div>
    <div class="results" id="results"></div>

<script>
    let unlocked = false;
    const unlockCode = '041013';
    const input = document.getElementById('searchInput');
    const results = document.getElementById('results');
    const mainPage = document.getElementById('mainPage');
    const backBtn = document.getElementById('backBtn');

    const trollAntworten = [
        "Hast du schon mal selber nachgedacht?",
        "Frag doch deine Mama.",
        "Google ist nicht dein persönlicher Assistent.",
        "Vielleicht solltest du mal ein Buch lesen.",
        "Die Antwort ist 42. Zufrieden?",
        "Ich bin eine Suchmaschine, kein Zauberer.",
        "Versuchs mal mit Bing. Die sind verzweifelter.",
        "Error 404: Motivation nicht gefunden.",
        "Klar, ich mach deine Hausaufgaben. Nicht.",
        "Hast du es schon mit Ausschalten und wieder Einschalten probiert?"
    ];

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') search();
    });

    function search() {
        const query = input.value.trim();
        if (!query) return;

        if (query === unlockCode) {
            unlocked = true;
            showUnlockedResults();
            return;
        }

        if (unlocked) {
            showNormalResults(query);
            return;
        }

        showTrollResult(query);
    }

    function showTrollResult(query) {
        mainPage.style.display = 'none';
        results.classList.add('show');
        backBtn.classList.add('show');

        const antwort = trollAntworten[Math.floor(Math.random() * trollAntworten.length)];

        results.innerHTML = `
            <div class="result-item">
                <div class="result-url">https://google.de/ergebnis</div>
                <div class="result-title">${antwort}</div>
                <div class="result-desc">Du hast nach "${query}" gesucht. Ernsthaft? ${antwort}</div>
            </div>
            <div class="result-item">
                <div class="result-url">https://stackoverflow.com/questions</div>
                <div class="result-title">Warum funktioniert mein Leben nicht?</div>
                <div class="result-desc">Diese Frage wurde als Duplikat markiert. Siehe: "Hast du schon mal selber nachgedacht?"</div>
            </div>
        `;
    }

    function showUnlockedResults() {
        mainPage.style.display = 'none';
        results.classList.add('show');
        backBtn.classList.add('show');

        results.innerHTML = `
            <div class="result-item">
                <div class="result-url">https://system.google/status</div>
                <div class="result-title">System entsperrt</div>
                <div class="result-desc">Gut gemacht. Ab jetzt funktioniert Google wieder normal. Vorerst...</div>
            </div>
        `;
    }

    function showNormalResults(query) {
        mainPage.style.display = 'none';
        results.classList.add('show');
        backBtn.classList.add('show');

        results.innerHTML = `
            <div class="result-item">
                <div class="result-url">https://de.wikipedia.org/wiki</div>
                <div class="result-title">${query} - Wikipedia</div>
                <div class="result-desc">${query} ist ein Begriff aus dem Bereich... [Hier würde normalerweise der echte Wikipedia-Eintrag stehen]</div>
            </div>
            <div class="result-item">
                <div class="result-url">https://www.youtube.com/results</div>
                <div class="result-title">${query} - YouTube</div>
                <div class="result-desc">Videos zu ${query}. Top Treffer: "${query} erklärt in 5 Minuten"</div>
            </div>
            <div class="result-item">
                <div class="result-url">https://reddit.com/r/de</div>
                <div class="result-title">Leute die nach ${query} suchen sind...</div>
                <div class="result-desc">Diskussion auf r/de über ${query}. 2.3k Upvotes.</div>
            </div>
        `;
    }

    function goBack() {
        mainPage.style.display = 'flex';
        results.classList.remove('show');
        backBtn.classList.remove('show');
        input.value = '';
        results.innerHTML = '';
    }
</script>
</body>
</html>
